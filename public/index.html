<!doctype html><html lang="ka"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>RANDO</title><script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script><style>
:root{--y:#ffd400;--b:#070707;--p:#111216;--m:#9b9b93;--r:#ff4f6d;--g:#52ff8d}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 15% 0,#3a2f00 0,transparent 28%),#060606;color:#fff;font-family:Inter,system-ui,sans-serif}.app{height:100%;display:grid;grid-template-rows:66px 1fr 78px}.top{display:flex;align-items:center;justify-content:space-between;padding:0 18px}.brand{font-weight:950;letter-spacing:.16em}.brand b{color:var(--y)}.pill{padding:9px 13px;border:1px solid #ffffff18;border-radius:999px;background:#111b;backdrop-filter:blur(18px);font-size:12px;color:#d6d3c3}.stage{position:relative;margin:0 14px;border-radius:28px;overflow:hidden;border:1px solid #ffffff18;background:#0b0b0d;box-shadow:0 28px 90px #000a, inset 0 0 60px #ffd40008}.stage:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,#fff0 0 45%,#ffffff08 50%,#fff0 55%);transform:translateX(-120%);animation:sweep 7s infinite}@keyframes sweep{60%,100%{transform:translateX(120%)}}video{background:#050505}#remote{width:100%;height:100%;object-fit:contain}.empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:30px}.empty.hide{display:none}.empty h1{font-size:clamp(32px,6vw,72px);margin:0 0 12px}.empty p{color:var(--m);max-width:580px}.spinner{width:72px;height:72px;border:5px solid #ffffff12;border-top-color:var(--y);border-radius:50%;margin:0 auto 20px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.local{position:absolute;right:18px;top:18px;width:min(30vw,310px);aspect-ratio:16/9;border-radius:20px;overflow:hidden;border:1px solid #ffffff35;box-shadow:0 20px 60px #000b;z-index:4;touch-action:none;cursor:grab}.local video{width:100%;height:100%;object-fit:contain;transform:scaleX(-1)}.tag{position:absolute;left:9px;bottom:9px;padding:5px 8px;border-radius:999px;background:#000a;font-size:10px}.chips{position:absolute;left:18px;top:18px;display:flex;gap:8px;z-index:3}.chip{padding:8px 10px;border-radius:999px;background:#08090bbd;border:1px solid #ffffff18;font-size:10px;font-weight:800}.challenge{position:absolute;left:50%;bottom:18px;transform:translate(-50%,25px);opacity:0;width:min(680px,92%);padding:16px 18px 19px;border:1px solid #ffffff22;border-radius:18px;background:#0b0c0fed;backdrop-filter:blur(18px);text-align:center;z-index:6;transition:.25s}.challenge.show{opacity:1;transform:translate(-50%,0)}.challenge:after,.toast:after{content:"";position:absolute;left:0;bottom:0;height:4px;width:100%;background:var(--g);transform-origin:left;animation:bar 6s linear forwards}@keyframes bar{to{transform:scaleX(0)}}.controls{display:flex;justify-content:center;align-items:center;gap:9px;padding:10px;flex-wrap:wrap}.btn{height:52px;padding:0 18px;border-radius:16px;border:1px solid #ffffff16;background:#15161a;color:#fff;font-weight:900;cursor:pointer}.btn:hover{transform:translateY(-2px)}.btn.icon{width:52px;padding:0}.btn.next{background:linear-gradient(135deg,var(--y),#fff08b);color:#111}.btn.stop{background:#2a2b31}.btn.report{background:#35131b;color:#ff9aad}.toastbox{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:50;width:min(450px,92%)}.toast{position:relative;padding:13px 14px 17px;border-radius:16px;background:#0d0e12f2;border:1px solid #ffffff18;box-shadow:0 18px 50px #0009}.modal{position:fixed;inset:0;display:grid;place-items:center;background:#050506dd;backdrop-filter:blur(18px);z-index:100;padding:18px}.modal.hide{display:none}.card{width:min(480px,100%);padding:26px;border-radius:26px;border:1px solid #ffffff18;background:linear-gradient(180deg,#17181d,#0b0b0e);box-shadow:0 40px 110px #000c}.card h2{font-size:34px;margin:0 0 8px}.card p{color:var(--m)}input,select{width:100%;height:48px;border-radius:14px;border:1px solid #ffffff18;background:#08090b;color:#fff;padding:0 13px;margin:6px 0}.tabs{display:flex;gap:8px;margin:14px 0}.tabs button{flex:1}.grid{display:grid;gap:8px}.admin{position:absolute;inset:75px 18px 88px;z-index:20;background:#0b0c0ff4;border:1px solid #ffffff1f;border-radius:24px;padding:18px;overflow:auto}.admin.hide{display:none}.admin table{width:100%;border-collapse:collapse}.admin td,.admin th{padding:10px;border-bottom:1px solid #ffffff10;text-align:left;font-size:12px}@media(max-width:700px){.stage{margin:0;border-radius:0}.local{width:43vw;right:10px;top:10px}.controls{gap:5px}.btn{height:46px;padding:0 12px;border-radius:14px;font-size:12px}.btn.icon{width:46px}.chips{left:10px;top:10px}.app{grid-template-rows:58px 1fr 112px}}
</style></head><body><div class="app"><div class="top"><div class="brand"><b>R</b>ANDO</div><div class="pill" id="status">OFFLINE</div></div><main class="stage" id="stage"><video id="remote" autoplay playsinline></video><div class="chips"><div class="chip">RANDOM CHAT</div><div class="chip" id="online">0 ONLINE</div></div><div class="empty" id="empty"><div><div class="spinner"></div><h1 id="emptyTitle">დაიწყე ძებნა</h1><p id="emptyText">საიტზე შემოსულ თავისუფალ მომხმარებელს ავტომატურად დაგაკავშირებს.</p></div></div><div class="local" id="local"><video id="me" autoplay muted playsinline></video><div class="tag">შენ • DRAG</div></div><div class="challenge" id="challenge"></div></main><div class="controls"><button class="btn icon" id="mic">🎙️</button><button class="btn icon" id="cam">📷</button><button class="btn icon" id="devices">⚙️</button><button class="btn" id="fun">🎲 CHALLENGE</button><button class="btn next" id="next">NEXT</button><button class="btn stop" id="stop">STOP</button><button class="btn report" id="report">REPORT</button><button class="btn" id="account">ACCOUNT</button></div></div><div class="toastbox" id="toastbox"></div>
<div class="modal" id="gate"><div class="card"><div class="brand"><b>R</b>ANDO</div><h2>Random ვიდეო ჩატი</h2><p>შედი ანგარიშით ან გააგრძელე სტუმრად. კამერის ჩართვის შემდეგ ავტომატურად დაიწყება ძებნა.</p><div class="tabs"><button class="btn" id="guest">სტუმრად</button><button class="btn next" id="showLogin">შესვლა</button></div><div class="grid" id="loginForm" style="display:none"><input id="user" placeholder="username"><input id="pass" type="password" placeholder="password"><div class="tabs"><button class="btn next" id="login">LOGIN</button><button class="btn" id="register">REGISTER</button></div></div></div></div>
<div class="modal hide" id="deviceModal"><div class="card"><h2>Devices</h2><select id="cameraSelect"></select><select id="micSelect"></select><button class="btn next" id="closeDevices">დახურვა</button></div></div>
<div class="modal hide" id="reportModal"><div class="card"><h2>Report</h2><select id="reason"><option value="nudity">Nudity / sexual content</option><option value="harassment">Harassment</option><option value="underage">Possible underage user</option><option value="spam">Spam / fake camera</option><option value="other">Other</option></select><div class="tabs"><button class="btn report" id="sendReport">REPORT & NEXT</button><button class="btn" id="cancelReport">Cancel</button></div></div></div>
<section class="admin hide" id="admin"><h2>ADMIN PANEL</h2><div id="stats"></div><table><thead><tr><th>Reason</th><th>Target</th><th>Status</th><th></th></tr></thead><tbody id="reports"></tbody></table></section>
<script>
const $=id=>document.getElementById(id);let stream,peer,call,ws,partnerPeerId='',micOn=true,camOn=true,token=localStorage.token||'',user=null;const challenges=['10 წამი სიცილის გარეშე.','აჩვენე ოთახში ყველაზე უცნაური ნივთი.','გააკეთე საუკეთესო NPC იმიტაცია.','3 წამში თქვი ყველაზე ცუდი pickup line.','აჩვენე ყველაზე სასაცილო სახე.','მეორეს შეურჩიე ახალი მეტსახელი.','თქვი ერთი სიმართლე და ერთი ტყუილი.','10 წამი მხოლოდ რობოტივით ილაპარაკე.','დაასახელე სამი რამ, რასაც დილით ვერ იტან.','ერთდროულად თქვით რიცხვი 1-დან 10-მდე.','ვინ უფრო დიდხანს გაძლებს თვალის დახამხამების გარეშე?','მეორეს დაახასიათე მხოლოდ სამი სიტყვით.'];
function toast(t){$('toastbox').innerHTML=`<div class="toast">${t}</div>`;setTimeout(()=>$('toastbox').innerHTML='',2600)}function status(t){$('status').textContent=t}async function api(url,opt={}){opt.headers={...(opt.headers||{}),'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})};const r=await fetch(url,opt);const j=await r.json();if(!r.ok)throw Error(j.error||'Error');return j}
async function start(){try{stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},aspectRatio:{ideal:16/9},frameRate:{ideal:30,max:30}},audio:{echoCancellation:true,noiseSuppression:true}});$('me').srcObject=stream;await devicesList();peer=new Peer(undefined,{host:location.hostname,port:location.port||undefined,path:'/peerjs',secure:location.protocol==='https:'});peer.on('open',id=>connectQueue(id));peer.on('call',c=>{call=c;c.answer(stream);bindCall(c)});peer.on('error',e=>toast('Peer error: '+e.type));$('gate').classList.add('hide');drag();}catch(e){toast('კამერა/მიკროფონი ვერ ჩაირთო')}}
function connectQueue(peerId){ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');ws.onopen=()=>{if(token)ws.send(JSON.stringify({type:'auth',token}));ws.send(JSON.stringify({type:'ready',peerId}));status('SEARCHING')};ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='queue'){status('SEARCHING • '+m.position);$('empty').classList.remove('hide');$('emptyTitle').textContent='ვეძებთ ადამიანს...'}if(m.type==='matched'){partnerPeerId=m.partnerPeerId;status('CONNECTING');if(m.initiator){call=peer.call(partnerPeerId,stream);bindCall(call)}}if(m.type==='partner-left'){closeCall();toast('მომხმარებელი გავიდა. ახალს ვეძებთ...')}if(m.type==='stopped'){status('STOPPED')}};ws.onclose=()=>status('OFFLINE')}
function bindCall(c){c.on('stream',s=>{$('remote').srcObject=s;$('empty').classList.add('hide');status('CONNECTED')});c.on('close',()=>closeCall())}function closeCall(){try{call?.close()}catch{}call=null;partnerPeerId='';$('remote').srcObject=null;$('empty').classList.remove('hide')}
$('next').onclick=()=>{closeCall();ws?.send(JSON.stringify({type:'next'}));status('SEARCHING')};$('stop').onclick=()=>{closeCall();ws?.send(JSON.stringify({type:'stop'}));status('STOPPED');$('emptyTitle').textContent='ძებნა გაჩერებულია';$('emptyText').textContent='NEXT დააჭირე გასაგრძელებლად.'};$('report').onclick=()=>partnerPeerId?$('reportModal').classList.remove('hide'):toast('ჯერ არავინ არის დაკავშირებული');$('cancelReport').onclick=()=>$('reportModal').classList.add('hide');$('sendReport').onclick=async()=>{try{if(token)await api('/api/report',{method:'POST',body:JSON.stringify({targetPeerId:partnerPeerId,reason:$('reason').value})});toast('Report მიღებულია');$('reportModal').classList.add('hide');$('next').click()}catch(e){toast(e.message)}};
$('mic').onclick=()=>{micOn=!micOn;stream?.getAudioTracks().forEach(t=>t.enabled=micOn);toast(micOn?'მიკროფონი ჩაირთო':'მიკროფონი გაითიშა')};$('cam').onclick=()=>{camOn=!camOn;stream?.getVideoTracks().forEach(t=>t.enabled=camOn);toast(camOn?'კამერა ჩაირთო':'კამერა გაითიშა')};$('fun').onclick=()=>{const t=challenges[Math.floor(Math.random()*challenges.length)];$('challenge').textContent=t;$('challenge').classList.add('show');setTimeout(()=>$('challenge').classList.remove('show'),6000)};
$('devices').onclick=()=>$('deviceModal').classList.remove('hide');$('closeDevices').onclick=()=>$('deviceModal').classList.add('hide');async function devicesList(){const d=await navigator.mediaDevices.enumerateDevices();fill($('cameraSelect'),d.filter(x=>x.kind==='videoinput'));fill($('micSelect'),d.filter(x=>x.kind==='audioinput'))}function fill(s,a){s.innerHTML=a.map((x,i)=>`<option value="${x.deviceId}">${x.label||'Device '+(i+1)}</option>`).join('')}$('cameraSelect').onchange=async e=>replace('video',await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:e.target.value}},audio:false}));$('micSelect').onchange=async e=>replace('audio',await navigator.mediaDevices.getUserMedia({audio:{deviceId:{exact:e.target.value}},video:false}));async function replace(k,s){const n=s.getTracks()[0],o=stream.getTracks().find(t=>t.kind===k),sender=call?.peerConnection?.getSenders().find(x=>x.track?.kind===k);if(sender)await sender.replaceTrack(n);stream.removeTrack(o);o.stop();stream.addTrack(n);$('me').srcObject=stream}
$('showLogin').onclick=()=>$('loginForm').style.display='grid';$('guest').onclick=start;$('login').onclick=()=>auth('login');$('register').onclick=()=>auth('register');async function auth(kind){try{const d=await api('/api/'+kind,{method:'POST',body:JSON.stringify({username:$('user').value,password:$('pass').value})});token=d.token;user=d.user;localStorage.token=token;toast('შესვლა წარმატებულია');start();if(user.role==='admin')openAdmin()}catch(e){toast(e.message)}}$('account').onclick=()=>{if(user?.role==='admin')openAdmin();else toast(token?'შესული ხარ':'სტუმრის რეჟიმი')};async function openAdmin(){try{const s=await api('/api/admin/stats'),r=await api('/api/admin/reports');$('admin').classList.remove('hide');$('stats').textContent=`Users: ${s.users} • Online: ${s.online} • Queue: ${s.queued} • Open reports: ${s.reports}`;$('reports').innerHTML=r.reports.map(x=>`<tr><td>${x.reason}</td><td>${x.targetPeerId}</td><td>${x.status}</td><td><button onclick="resolveReport('${x.id}')">Resolve</button></td></tr>`).join('')}catch(e){toast(e.message)}}window.resolveReport=async id=>{await api('/api/admin/reports/'+id+'/resolve',{method:'POST'});openAdmin()};
function drag(){const b=$('local'),s=$('stage');let on=false,ox=0,oy=0;b.onpointerdown=e=>{on=true;const r=b.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;b.setPointerCapture(e.pointerId)};window.onpointermove=e=>{if(!on)return;const r=s.getBoundingClientRect();b.style.right='auto';b.style.left=Math.max(6,Math.min(e.clientX-r.left-ox,r.width-b.offsetWidth-6))+'px';b.style.top=Math.max(6,Math.min(e.clientY-r.top-oy,r.height-b.offsetHeight-6))+'px'};window.onpointerup=()=>on=false}
if(token){api('/api/me').then(d=>{user=d.user;if(user.role==='admin')toast('Admin account detected')}).catch(()=>{localStorage.removeItem('token');token=''})}
</script></body></html>
